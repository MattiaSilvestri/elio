name: Bug Report
description: Report broken behavior in elio.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for reproducible runtime issues that are not primarily preview, installation, packaging, or security reports.

        For suspected vulnerabilities, use private vulnerability reporting instead.
  - type: checkboxes
    id: checks
    attributes:
      label: Before Opening
      options:
        - label: I have searched the existing issues.
          required: true
        - label: I can reproduce this on the latest released version, or on `main` when practical.
          required: false
  - type: input
    id: version
    attributes:
      label: elio Version
      description: Run `elio --version`, or include the commit if building from source.
      placeholder: "elio 1.0.1"
    validations:
      required: true
  - type: dropdown
    id: install-source
    attributes:
      label: Installation Source
      options:
        - AUR
        - Fedora COPR
        - Homebrew
        - crates.io / cargo install
        - Built from source
        - Release artifact
        - Other
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating System
      placeholder: "Example: Fedora 41, Arch Linux, macOS 15, Windows 11"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Terminal
      description: Include terminal name and version if relevant.
      placeholder: "Example: Ghostty 1.1"
    validations:
      required: false
  - type: textarea
    id: behavior
    attributes:
      label: What Happened?
      description: Include what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include the folder layout, config, key sequence, mouse action, or command that triggers the issue.
      placeholder: |
        1. Open `elio` in ...
        2. Select ...
        3. Press ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Logs, Config, or Additional Context
      description: Paste relevant logs, warnings, config/theme entries, screenshots, recordings, or links.
    validations:
      required: false
