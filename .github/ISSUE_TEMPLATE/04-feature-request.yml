name: ✨ Feature Request
description: Propose a user-visible change or enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for new behavior, preview coverage, platform support, configuration, theming, or workflow improvements.
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should elio do, and what problem would it solve?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mention alternatives, workarounds, or platform, terminal, config, theme, keybinding, and dependency implications.
    validations:
      required: false
