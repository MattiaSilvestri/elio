name: ­¤æü’ĖÅ Preview or File Type Issue
description: Report incorrect or missing previews for files, archives, documents, media, or images.
title: "[Preview]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when the main problem is in the Preview pane, file classification, inline images, thumbnails, metadata, or optional helper-tool behavior.

        Do not attach private or sensitive files. If possible, use a minimal public sample file.
  - type: input
    id: version
    attributes:
      label: elio Version
      description: Run `elio --version`, or include the commit if building from source.
      placeholder: "elio 1.0.1"
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating System
      placeholder: "Example: Fedora, Arch Linux, macOS, Windows, BSD (include version if known)"
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "Example: Ghostty 1.1, Kitty 0.39, WezTerm nightly, Windows Terminal"
    validations:
      required: true
  - type: input
    id: file-type
    attributes:
      label: File or Preview Type
      description: Include the extension and what the file contains.
      placeholder: "Example: PDF page preview, SVG image preview, ZIP archive listing"
    validations:
      required: true
  - type: textarea
    id: helper-tools
    attributes:
      label: Optional Helper Tools
      description: List any relevant installed tools and versions, such as `ffmpeg`, `pdfinfo`, `pdftocairo`, `resvg`, `magick`, `7z`, `bsdtar`, or `isoinfo`.
      placeholder: "Example: pdfinfo 25.03.0, pdftocairo 25.03.0"
    validations:
      required: false
  - type: textarea
    id: behavior
    attributes:
      label: What Happened?
      description: Describe what elio shows now, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Describe how to reproduce the issue.
      placeholder: |
        1. Run `elio` in ...
        2. Select a file named ...
        3. Observe the Preview pane ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Debug Output or Sample File
      description: "If relevant, set `ELIO_DEBUG_PREVIEW=1` and paste useful lines from `elio-preview.log`.\n\nAttach a minimal public sample file, screenshot, or recording if it helps reproduce the issue."
    validations:
      required: false
